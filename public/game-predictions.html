<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Predictions — ORACLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#060a14;--bg-base:#0a0f1a;--bg-card:#111827;--bg-elevated:#1a2236;--border:#1e293b;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--accent:#38bdf8;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--font-display:"Outfit",sans-serif;--font-body:"DM Sans",sans-serif;--font-mono:"JetBrains Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);line-height:1.6;}a{color:var(--accent);text-decoration:none;}
.container{max-width:960px;margin:0 auto;padding:0 20px;}
.nav{padding:14px 0;border-bottom:1px solid var(--border);background:var(--bg-base);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:960px;margin:0 auto;padding:0 20px;}.nav-logo{font-family:var(--font-display);font-weight:900;font-size:18px;letter-spacing:2px;}.nav-logo span{color:var(--accent);}.nav-links{display:flex;gap:6px;flex-wrap:wrap;}.nav-links a{font-size:12px;color:var(--text-secondary);font-weight:500;padding:5px 10px;border-radius:6px;transition:all .2s;}.nav-links a:hover,.nav-links a.active{background:var(--bg-elevated);color:var(--text-primary);}
.hero{padding:32px 0 20px;text-align:center;}.hero h1{font-family:var(--font-display);font-weight:900;font-size:clamp(24px,4vw,32px);}.hero h1 span{background:linear-gradient(135deg,var(--green),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.hero p{color:var(--text-secondary);font-size:13px;margin-top:6px;}
.sport-tabs{display:flex;gap:4px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}.sport-tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);background:transparent;border:1px solid transparent;transition:all .2s;}.sport-tab:hover{color:var(--text-secondary);background:var(--bg-card);}.sport-tab.active{color:var(--text-primary);background:var(--bg-card);border-color:var(--accent);}
.game-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;margin:14px 0;transition:all .3s;}.game-card:hover{border-color:rgba(56,189,248,.25);transform:translateY(-1px);}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.teams{display:flex;align-items:center;gap:10px;}.team-name{font-family:var(--font-display);font-weight:700;font-size:16px;}.vs{color:var(--text-muted);font-size:12px;font-weight:600;}
.env-badge{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;font-family:var(--font-mono);text-transform:uppercase;}
.predictions-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.pred-box{background:var(--bg-elevated);border-radius:10px;padding:14px;text-align:center;}.pred-label{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;margin-bottom:6px;}.pred-pick{font-family:var(--font-display);font-weight:800;font-size:16px;margin-bottom:4px;}.pred-conf{font-family:var(--font-mono);font-size:12px;padding:2px 8px;border-radius:4px;display:inline-block;}.pred-book{font-size:10px;color:var(--text-muted);margin-top:4px;}
.line-shop{margin-top:12px;overflow-x:auto;}.line-shop summary{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--text-secondary);cursor:pointer;padding:8px 0;}.line-shop summary:hover{color:var(--text-primary);}
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;}th{text-align:left;padding:6px 8px;background:var(--bg-elevated);font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;}td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:var(--font-mono);}
.best-cell{color:var(--green);font-weight:700;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin:16px 0;}.stat{padding:10px;background:var(--bg-elevated);border-radius:8px;text-align:center;}.stat .k{font-size:9px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;}.stat .v{font-family:var(--font-display);font-weight:700;font-size:16px;margin-top:2px;}
.empty{text-align:center;padding:40px;color:var(--text-muted);font-size:14px;}
.footer{text-align:center;padding:30px 0;color:var(--text-muted);font-size:11px;border-top:1px solid var(--border);margin-top:40px;}
@media(max-width:640px){.predictions-grid{grid-template-columns:1fr;}.game-header{flex-direction:column;gap:8px;}.teams{flex-wrap:wrap;justify-content:center;}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a href="/" class="nav-logo">⟁ <span>ORACLE</span></a><div class="nav-links"><a href="/">Home</a><a href="/pick">POTD</a><a href="/app/">App</a><a href="/sharp">Sharp</a><a href="/parlay">Parlay</a><a href="/games" class="active">Games</a><a href="/how-it-works">Guide</a></div></div></nav>

<div class="container">
<div class="hero"><h1>🏟️ <span>Game Predictions</span></h1><p>AI-powered spread picks, over/under calls, and best odds across 20+ sportsbooks for every game today.</p></div>

<div class="sport-tabs" id="sportTabs">
  <div class="sport-tab active" data-sport="nba">🏀 NBA</div>
  <div class="sport-tab" data-sport="nfl">🏈 NFL</div>
  <div class="sport-tab" data-sport="mlb">⚾ MLB</div>
  <div class="sport-tab" data-sport="nhl">🏒 NHL</div>
</div>

<div class="stat-row" id="topStats"></div>
<div id="gamesContainer"><div class="empty">Loading game predictions...</div></div>
</div>

<div class="footer">⟁ ORACLE — For entertainment & research only. Not financial or gambling advice.</div>

<script>
let currentSport = 'nba';

document.querySelectorAll('.sport-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSport = tab.dataset.sport;
    loadGames();
  });
});

async function loadGames() {
  const container = document.getElementById('gamesContainer');
  container.innerHTML = '<div class="empty">Loading predictions...</div>';

  try {
    const resp = await fetch(`/api/games/${currentSport}`);
    const data = await resp.json();

    if (!data.games || data.games.length === 0) {
      container.innerHTML = '<div class="empty">No games with odds available today for this sport.</div>';
      document.getElementById('topStats').innerHTML = '';
      return;
    }

    // Top stats
    const avgConf = Math.round(data.games.reduce((s, g) => s + g.predictions.spread.confidence, 0) / data.games.length);
    const highConf = data.games.filter(g => g.predictions.spread.confidence >= 70).length;
    document.getElementById('topStats').innerHTML = `
      <div class="stat"><div class="k">Games Today</div><div class="v">${data.games.length}</div></div>
      <div class="stat"><div class="k">Avg Confidence</div><div class="v">${avgConf}%</div></div>
      <div class="stat"><div class="k">High Confidence</div><div class="v" style="color:var(--green)">${highConf}</div></div>
      <div class="stat"><div class="k">Books Compared</div><div class="v">${Math.max(...data.games.map(g => g.bookCount))}</div></div>
    `;

    container.innerHTML = data.games.map(g => renderGame(g)).join('');
  } catch (e) {
    container.innerHTML = `<div class="empty">Error loading games: ${e.message}</div>`;
  }
}

function renderGame(g) {
  const sp = g.predictions.spread;
  const tp = g.predictions.total;
  const w = g.predictions.winner;

  const envColors = {
    'Shootout': 'var(--red)', 'High Scoring': 'var(--amber)', 'Blowout Expected': 'var(--purple)',
    'Toss-Up': 'var(--accent)', 'Defensive Battle': 'var(--text-muted)', 'Standard': 'var(--text-secondary)',
  };
  const envColor = envColors[g.environment] || 'var(--text-muted)';

  const confColor = (c) => c >= 75 ? 'var(--green)' : c >= 60 ? 'var(--accent)' : 'var(--amber)';
  const confBg = (c) => c >= 75 ? 'rgba(16,185,129,.15)' : c >= 60 ? 'rgba(56,189,248,.15)' : 'rgba(245,158,11,.15)';

  const time = new Date(g.commenceTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  // Line shopping table
  const books = Object.entries(g.lineShop);
  let shopHTML = '';
  if (books.length > 0) {
    const bestHomeSpreadPrice = g.bestOdds.homeSpread?.price;
    const bestAwaySpreadPrice = g.bestOdds.awaySpread?.price;
    const bestOverPrice = g.bestOdds.over?.price;
    const bestUnderPrice = g.bestOdds.under?.price;

    shopHTML = `<details class="line-shop"><summary>📊 Line Shopping — ${books.length} books compared</summary><table>
      <thead><tr><th>Book</th><th>${g.homeAbbr} Spread</th><th>${g.awayAbbr} Spread</th><th>Over</th><th>Under</th></tr></thead>
      <tbody>${books.map(([book, lines]) => `<tr>
        <td style="font-weight:600;">${book}</td>
        <td>${lines.homeSpread || '—'}</td>
        <td>${lines.awaySpread || '—'}</td>
        <td>${lines.over || '—'}</td>
        <td>${lines.under || '—'}</td>
      </tr>`).join('')}</tbody>
    </table></details>`;
  }

  return `<div class="game-card">
    <div class="game-header">
      <div class="teams">
        <span class="team-name">${g.awayAbbr}</span>
        <span class="vs">@</span>
        <span class="team-name">${g.homeAbbr}</span>
        <span style="color:var(--text-muted);font-size:11px;margin-left:8px;">${time}</span>
      </div>
      <div class="env-badge" style="background:${envColor}22;color:${envColor}">${g.environment}</div>
    </div>

    <div class="predictions-grid">
      <div class="pred-box">
        <div class="pred-label">🏆 Winner</div>
        <div class="pred-pick">${w.abbr}</div>
        <div class="pred-conf" style="background:${confBg(w.confidence)};color:${confColor(w.confidence)}">${w.confidence}%</div>
      </div>
      <div class="pred-box">
        <div class="pred-label">📏 Spread Pick</div>
        <div class="pred-pick" style="color:${confColor(sp.confidence)}">${sp.abbr} ${sp.spread > 0 ? '+' : ''}${sp.spread}</div>
        <div class="pred-conf" style="background:${confBg(sp.confidence)};color:${confColor(sp.confidence)}">${sp.confidence}%</div>
        ${sp.bestOdds ? `<div class="pred-book">Best: ${sp.bestOdds.book} (${sp.bestOdds.price > 0 ? '+' : ''}${sp.bestOdds.price})</div>` : ''}
      </div>
      <div class="pred-box">
        <div class="pred-label">${tp.side === 'OVER' ? '🔥' : '❄️'} Total</div>
        <div class="pred-pick" style="color:${tp.side === 'OVER' ? 'var(--green)' : 'var(--red)'}">${tp.side} ${tp.total}</div>
        <div class="pred-conf" style="background:${confBg(tp.confidence)};color:${confColor(tp.confidence)}">${tp.confidence}%</div>
        ${tp.side === 'OVER' && tp.bestOver ? `<div class="pred-book">Best: ${tp.bestOver.book} (${tp.bestOver.price > 0 ? '+' : ''}${tp.bestOver.price})</div>` : ''}
        ${tp.side === 'UNDER' && tp.bestUnder ? `<div class="pred-book">Best: ${tp.bestUnder.book} (${tp.bestUnder.price > 0 ? '+' : ''}${tp.bestUnder.price})</div>` : ''}
      </div>
    </div>

    ${shopHTML}
  </div>`;
}

loadGames();
</script>
</body>
</html>
