<!-- help-button.html — injected into /app/ pages -->

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
.oracle-fab-group {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 0;
  background: #111827;
  border: 1px solid #1e293b;
  border-radius: 50px;

.oracle-fab-group a {

  color: #94a3b8;
  font-family: "DM Sans", sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.oracle-fab-group a:first-child {
  border-right: 1px solid #1e293b;
}
.oracle-fab-group a {
  border-right: 1px solid #1e293b;
}
.oracle-fab-group a:last-child {
  border-right: none;
}
.oracle-fab-group a:hover {
  background: #1a2236;

  text-decoration: none;
}
.oracle-fab-icon {

</style>
<div class="oracle-fab-group">
  <a href="/"><div class="oracle-fab-icon" style="background:rgba(56,189,248,0.15);color:#38bdf8;">⟁</div><span>Home</span></a>
  <a href="/games"><div class="oracle-fab-icon" style="background:rgba(16,185,129,0.15);color:#10b981;">🏟</div><span>Games</span></a>
  <a href="/player"><div class="oracle-fab-icon" style="background:rgba(245,158,11,0.15);color:#f59e0b;">👤</div><span>Players</span></a>
  <a href="/parlay"><div class="oracle-fab-icon" style="background:rgba(167,139,250,0.15);color:#a78bfa;">🎲</div><span>Parlay</span></a>
  <a href="/sharp"><div class="oracle-fab-icon sharp">⚡</div><span>Sharp</span></a>
  <a href="/how-it-works"><div class="oracle-fab-icon help">?</div><span>Guide</span></a>
</div>
<script>
// Hide "AI predictions require an Anthropic API key" and replace with ORACLE message
(function fixAIPredictMessage() {
  function replaceMessage() {
    const allElements = document.querySelectorAll('*');
    for (const el of allElements) {
      if (el.children.length > 5) continue;
      const text = el.textContent || '';
      if (text.includes('Anthropic API key') || text.includes('ANTHROPIC_API_KEY')) {
        // Check if this is the container with the error messages
        if (el.innerText && el.innerText.includes('AI predictions require')) {
          el.innerHTML = '<div style="padding:12px 16px;background:#111827;border:1px solid #1e293b;border-radius:10px;"><div style="font-size:14px;font-weight:700;color:#38bdf8;margin-bottom:4px;">🔮 ORACLE AI Predictions</div><div style="font-size:12px;color:#94a3b8;">Click "AI Predict" on any game for winner prediction, spread pick, and over/under — powered by ORACLE\'s 18-factor model.</div><div style="margin-top:8px;"><a href="/games" style="font-size:12px;color:#10b981;text-decoration:none;font-weight:600;">🏟️ View full Game Predictions page →</a></div></div>';
          return true;
        }
      }
    }
    return false;
  }

  // Run immediately and also watch for tab changes
  replaceMessage();
  const observer = new MutationObserver(() => { replaceMessage(); fixSetupRequired(); });
  observer.observe(document.body, { childList: true, subtree: true, characterData: true });
  // Also run periodically for React re-renders
  setInterval(() => { replaceMessage(); fixSetupRequired(); }, 2000);

  // Fix "Setup Required" on Top Picks tab — force load picks from ORACLE's API
  async function fixSetupRequired() {
    const allEls = document.querySelectorAll('*');
    for (const el of allEls) {
      if (el.children.length > 3) continue;
      const text = el.innerText || '';
      if (text.includes('Setup Required') && text.includes('Failed to generate picks')) {
        try {
          const sport = document.querySelector('[class*="active"]')?.textContent?.toLowerCase() || 'nba';
          const sportKey = ['nba','nfl','mlb','nhl'].find(s => sport.includes(s)) || 'nba';
          const resp = await fetch(`/api/props/${sportKey}/picks`);
          const data = await resp.json();
          if (data.picks && data.picks.length > 0) {
            let html = '<div style="padding:16px;">';
            html += '<div style="font-size:16px;font-weight:700;color:#38bdf8;margin-bottom:12px;">🔥 ORACLE Top Picks</div>';
            for (const p of data.picks.slice(0, 8)) {
              const gradeColor = p.grade?.includes('A') ? '#10b981' : p.grade?.includes('B') ? '#38bdf8' : '#f59e0b';
              html += `<div style="background:#111827;border:1px solid #1e293b;border-radius:10px;padding:12px;margin-bottom:8px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <div>
                    <span style="font-weight:700;color:#f1f5f9;">${p.player}</span>
                    <span style="color:#64748b;font-size:12px;margin-left:8px;">${p.game || ''}</span>
                  </div>
                  <span style="background:${gradeColor}22;color:${gradeColor};padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;">${p.grade} ${p.confidence}%</span>
                </div>
                <div style="margin-top:6px;display:flex;gap:12px;font-size:13px;">
                  <span style="color:${p.pick === 'OVER' ? '#10b981' : '#ef4444'};font-weight:600;">${p.pick} ${p.line} ${p.market}</span>
                  <span style="color:#94a3b8;">Proj: ${p.projection?.toFixed(1) || '—'}</span>
                  <span style="color:#94a3b8;">Hit: ${p.hitRate?.toFixed(0) || '—'}%</span>
                  <span style="color:#94a3b8;">${p.bestBook || ''}</span>
                </div>
                <div style="margin-top:4px;font-size:11px;color:#64748b;">${p.reasoning || ''}</div>
              </div>`;
            }
            html += '</div>';
            // Find the parent container and replace
            let container = el;
            while (container && container.tagName !== 'MAIN' && container.parentElement) {
              if (container.offsetHeight > 200) break;
              container = container.parentElement;
            }
            container.innerHTML = html;
          }
        } catch (e) {}
        return;
      }
    }
  }
})();

// === Player Headshot Injection ===
// Adds ESPN player headshot photos to props list rows
(function injectHeadshots() {
  const headshotCache = {};
  const pendingLookups = new Set();

  async function getHeadshot(name) {
    if (headshotCache[name] !== undefined) return headshotCache[name];
    if (pendingLookups.has(name)) return null;
    pendingLookups.add(name);
    try {
      const resp = await fetch(`/api/headshots/nba/${encodeURIComponent(name)}`);
      const data = await resp.json();
      headshotCache[name] = data.headshot || null;
    } catch (e) {
      headshotCache[name] = null;
    }
    pendingLookups.delete(name);
    return headshotCache[name];
  }

  async function addHeadshotsToRows() {
    // Find all prop rows that have player names but no headshot yet
    const rows = document.querySelectorAll('tr, [class*="prop"], [class*="row"], [class*="card"]');
    for (const row of rows) {
      if (row.querySelector('.oracle-headshot')) continue;
      // Find the first child that looks like a player name (bold text, not a number)
      const nameEl = row.querySelector('td:first-child, [class*="player"], [class*="name"]');
      if (!nameEl) continue;
      const text = nameEl.textContent?.trim();
      if (!text || text.length < 4 || text.length > 40 || /^\d/.test(text)) continue;
      // Extract just the player name (first line, before any team/game info)
      const name = text.split('\n')[0].trim();
      if (!name || name.includes('·') || name.includes('@')) continue;
      
      const headshot = await getHeadshot(name);
      if (headshot) {
        const img = document.createElement('img');
        img.src = headshot;
        img.className = 'oracle-headshot';
        img.style.cssText = 'width:36px;height:26px;border-radius:4px;object-fit:cover;margin-right:8px;vertical-align:middle;flex-shrink:0;';
        img.onerror = function() { this.style.display = 'none'; };
        // Insert before the name
        if (nameEl.firstChild) {
          nameEl.insertBefore(img, nameEl.firstChild);
        }
      }
    }
  }

  // Run every 3 seconds to catch new content
  setInterval(addHeadshotsToRows, 3000);
  // Also run on mutations
  const hsObserver = new MutationObserver(() => { setTimeout(addHeadshotsToRows, 500); });
  hsObserver.observe(document.body, { childList: true, subtree: true });
})();
</script>
