<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futures Predictions — ORACLE</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#060a14;--bg-card:#111827;--bg-elevated:#1a2236;--border:#1e293b;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--accent:#38bdf8;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--gold:#fbbf24;--font-display:"Outfit",sans-serif;--font-body:"DM Sans",sans-serif;--font-mono:"JetBrains Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);line-height:1.6;}a{color:var(--accent);text-decoration:none;}
.container{max-width:960px;margin:0 auto;padding:0 20px;}
.hero{padding:28px 0 16px;text-align:center;}.hero h1{font-family:var(--font-display);font-weight:900;font-size:clamp(22px,4vw,30px);}.hero h1 span{background:linear-gradient(135deg,var(--gold),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.hero p{color:var(--text-secondary);font-size:13px;margin-top:4px;}
.section{margin:24px 0 12px;}.section h2{font-family:var(--font-display);font-weight:800;font-size:16px;}
.tier{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:10px 0;}
.tier-title{font-family:var(--font-display);font-weight:800;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.team-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.team-row:last-child{border-bottom:none;}
.team-name{font-family:var(--font-display);font-weight:700;}
.team-record{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.team-pct{font-family:var(--font-mono);font-size:14px;font-weight:700;}
.bar{height:6px;background:var(--bg-elevated);border-radius:3px;flex:1;margin:0 12px;max-width:200px;}.bar-fill{height:100%;border-radius:3px;}
.empty{text-align:center;padding:40px;color:var(--text-muted);}
.footer{text-align:center;padding:24px 0;color:var(--text-muted);font-size:10px;border-top:1px solid var(--border);margin-top:30px;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--text-muted);}.loading::after{content:'';width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.disclaimer{text-align:center;padding:12px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:11px;color:var(--amber);margin:16px 0;}
</style>
</head>
<body>
<div class="container">
<div class="hero"><h1>🏆 <span>Futures Predictions</span></h1><p>Championship contenders, MVP candidates, and playoff projections based on ORACLE's live ESPN power ratings.</p></div>
<div id="content"><div class="loading">Loading futures data from ESPN</div></div>
</div>
<div class="footer">⟁ ORACLE — Futures projections based on current standings and power ratings. For entertainment & research only.</div>
<script>
async function loadFutures() {
  try {
    var resp = await fetch('https://site.api.espn.com/apis/v2/sports/basketball/nba/standings');
    var data = await resp.json();
    var allTeams = [];
    (data.children || []).forEach(function(conf) {
      var confName = conf.name || (conf.abbreviation === 'E' ? 'Eastern' : 'Western');
      (conf.standings ? conf.standings.entries || [] : []).forEach(function(entry) {
        var team = entry.team || {};
        var stats = entry.stats || [];
        function getStat(n) { var s = stats.find(function(st){return st.name===n||st.abbreviation===n}); return s ? s.value : 0; }
        function getDisplay(n) { var s = stats.find(function(st){return st.name===n||st.abbreviation===n}); return s ? (s.displayValue||'') : ''; }
        allTeams.push({
          abbr: team.abbreviation, name: team.displayName, conf: confName,
          wins: getStat('wins'), losses: getStat('losses'), pct: getStat('winPercent'),
          ppg: getStat('avgPointsFor'), oppg: getStat('avgPointsAgainst'),
          diff: getStat('pointDifferential'), seed: getStat('playoffSeed'),
          streak: getDisplay('streak'), l10: getDisplay('Last Ten Games'),
        });
      });
    });
    allTeams.sort(function(a,b) { return b.pct - a.pct; });

    var html = '';

    // Championship Contenders
    html += '<div class="section"><h2>🏆 Championship Contenders</h2></div>';
    var tiers = [
      { name: '🥇 Title Favorites', color: 'var(--gold)', teams: allTeams.filter(function(t){return t.pct>=.700}) },
      { name: '🥈 Serious Contenders', color: 'var(--accent)', teams: allTeams.filter(function(t){return t.pct>=.580&&t.pct<.700}) },
      { name: '🥉 Playoff Locks', color: 'var(--green)', teams: allTeams.filter(function(t){return t.pct>=.500&&t.pct<.580}) },
      { name: '⚔️ Play-In Bubble', color: 'var(--amber)', teams: allTeams.filter(function(t){return t.pct>=.400&&t.pct<.500}) },
      { name: '📉 Lottery Bound', color: 'var(--red)', teams: allTeams.filter(function(t){return t.pct<.400}) },
    ];
    tiers.forEach(function(tier) {
      if (tier.teams.length === 0) return;
      html += '<div class="tier"><div class="tier-title" style="color:'+tier.color+'">'+tier.name+' ('+tier.teams.length+' teams)</div>';
      tier.teams.forEach(function(t) {
        html += '<div class="team-row"><div><span class="team-name">'+t.name+'</span> <span class="team-record">'+t.wins+'-'+t.losses+' • '+t.conf+'</span></div>' +
          '<div class="bar"><div class="bar-fill" style="width:'+(t.pct*100)+'%;background:'+tier.color+'"></div></div>' +
          '<div class="team-pct" style="color:'+tier.color+'">'+(t.pct*100).toFixed(1)+'%</div></div>';
      });
      html += '</div>';
    });

    // Conference Standings
    ['Eastern','Western'].forEach(function(conf) {
      var confTeams = allTeams.filter(function(t){return t.conf.indexOf(conf)>=0||t.conf.indexOf(conf.charAt(0))>=0});
      confTeams.sort(function(a,b){return b.pct-a.pct});
      html += '<div class="section"><h2>'+(conf==='Eastern'?'🏀':'🌟')+' '+conf+' Conference</h2></div>';
      html += '<div class="tier">';
      confTeams.forEach(function(t,i) {
        var seedColor = i < 6 ? 'var(--green)' : i < 10 ? 'var(--amber)' : 'var(--red)';
        var seedLabel = i < 6 ? 'Playoff' : i < 10 ? 'Play-In' : 'Lottery';
        html += '<div class="team-row"><div style="min-width:24px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">#'+(i+1)+'</div><div style="flex:1"><span class="team-name">'+t.name+'</span> <span class="team-record">'+t.wins+'-'+t.losses+' | Streak: '+t.streak+' | L10: '+t.l10+'</span></div>' +
          '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:9px;padding:2px 6px;border-radius:4px;background:'+seedColor+'22;color:'+seedColor+';font-family:var(--font-mono)">'+seedLabel+'</span>' +
          '<span class="team-pct" style="color:'+seedColor+'">'+(t.pct*100).toFixed(1)+'%</span></div></div>';
      });
      html += '</div>';
    });

    html += '<div class="disclaimer">⚠️ Futures projections are based on current ESPN standings and ORACLE power ratings. Odds and projections change daily.</div>';
    document.getElementById('content').innerHTML = html;
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Error loading futures: '+e.message+'</div>';
  }
}
loadFutures();
</script>
</body>
</html>
