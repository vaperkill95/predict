<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Props Explorer — ORACLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#060a14;--bg-base:#0a0f1a;--bg-card:#111827;--bg-elevated:#1a2236;--border:#1e293b;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--accent:#38bdf8;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--font-display:"Outfit",sans-serif;--font-body:"DM Sans",sans-serif;--font-mono:"JetBrains Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);line-height:1.5;}
a{color:var(--accent);text-decoration:none;}

.container{max-width:1400px;margin:0 auto;padding:0 16px;}
.page-header{padding:24px 0 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.page-title{font-family:var(--font-display);font-size:24px;font-weight:800;}
.page-title span{color:var(--accent);}
.badge{background:var(--accent);color:#000;font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:8px;}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:0;}
.filter-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);transition:all 0.15s;white-space:nowrap;}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.filter-btn:hover:not(.active){background:var(--bg-elevated);color:var(--text-primary);}
.search-input{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text-primary);font-size:12px;width:180px;outline:none;font-family:var(--font-body);}
.search-input:focus{border-color:var(--accent);}

/* Stats bar */
.stats-bar{display:flex;gap:16px;padding:10px 0;font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
.stats-bar .stat{display:flex;align-items:center;gap:4px;}
.stats-bar .stat strong{color:var(--text-primary);font-family:var(--font-mono);}

/* Table */
.table-wrap{overflow-x:auto;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;min-width:1100px;}
thead{position:sticky;top:0;z-index:10;}
th{background:var(--bg-card);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
th:first-child{text-align:left;padding-left:12px;}
th:hover{color:var(--accent);}
th.sorted{color:var(--accent);}
th .arrow{font-size:8px;margin-left:2px;}
td{padding:7px 6px;font-size:12px;border-bottom:1px solid var(--border);text-align:center;font-family:var(--font-mono);white-space:nowrap;}
td:first-child{text-align:left;padding-left:12px;font-family:var(--font-body);}
tr:hover{background:var(--bg-elevated);}

/* Player cell */
.player-cell{display:flex;align-items:center;gap:8px;}
.player-cell img{width:32px;height:24px;border-radius:4px;object-fit:cover;flex-shrink:0;}
.player-name{font-weight:700;font-size:13px;color:var(--text-primary);}
.player-name a{color:var(--text-primary);}
.player-name a:hover{color:var(--accent);}
.player-sub{font-size:10px;color:var(--text-muted);}
.player-pos{font-size:10px;color:var(--text-muted);background:var(--bg-elevated);padding:1px 4px;border-radius:3px;}

/* Line cell */
.line-val{font-size:15px;font-weight:700;color:var(--accent);}
.line-market{font-size:10px;color:var(--text-muted);font-family:var(--font-body);}

/* Hit rate colors */
.hr-hot{color:var(--green);font-weight:600;}
.hr-warm{color:var(--accent);}
.hr-cool{color:var(--amber);}
.hr-cold{color:var(--red);}

/* Diff cell */
.diff-pos{color:var(--green);font-weight:600;}
.diff-neg{color:var(--red);font-weight:600;}

/* Tags */
.tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;}
.tag-demon{background:rgba(239,68,68,0.15);color:var(--red);}
.tag-goblin{background:rgba(167,139,250,0.15);color:var(--purple);}
.tag-edge{background:rgba(56,189,248,0.15);color:var(--accent);}

/* Streak */
.streak-w{color:var(--green);}
.streak-l{color:var(--red);}

.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.loading{text-align:center;padding:40px;color:var(--text-muted);}

@media(max-width:768px){
  .page-header{flex-direction:column;align-items:flex-start;}
  table{min-width:800px;}
}
</style>
</head>
<body>
<div class="container">

<div class="page-header">
  <div>
    <div class="page-title">📊 <span>Props Explorer</span><span class="badge" id="propCount">0</span></div>
  </div>
  <input type="text" class="search-input" id="searchInput" placeholder="Search player..." oninput="filterProps()">
</div>

<!-- Sport Filters -->
<div class="filters" id="sportFilters">
  <div class="filter-btn active" data-sport="nba" onclick="setSport('nba')">🏀 NBA</div>
  <div class="filter-btn" data-sport="nfl" onclick="setSport('nfl')">🏈 NFL</div>
  <div class="filter-btn" data-sport="mlb" onclick="setSport('mlb')">⚾ MLB</div>
  <div class="filter-btn" data-sport="nhl" onclick="setSport('nhl')">🏒 NHL</div>
</div>

<!-- Market Filters -->
<div class="filters" id="marketFilters" style="padding-top:8px;border-bottom:none;">
  <div class="filter-btn active" data-market="all" onclick="setMarket('all')">All</div>
  <div class="filter-btn" data-market="points" onclick="setMarket('points')">Points</div>
  <div class="filter-btn" data-market="rebounds" onclick="setMarket('rebounds')">Rebounds</div>
  <div class="filter-btn" data-market="assists" onclick="setMarket('assists')">Assists</div>
  <div class="filter-btn" data-market="threes" onclick="setMarket('threes')">3PT</div>
  <div class="filter-btn" data-market="pra" onclick="setMarket('pra')">PRA</div>
</div>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar"></div>

<!-- Table -->
<div class="table-wrap">
<table>
<thead>
<tr>
  <th style="min-width:200px;" onclick="sortBy('player')">Player <span class="arrow"></span></th>
  <th onclick="sortBy('line')">Line <span class="arrow"></span></th>
  <th onclick="sortBy('books')">Books</th>
  <th onclick="sortBy('proj')" title="ORACLE 18-Factor Projection">Proj <span class="arrow"></span></th>
  <th onclick="sortBy('diff')" title="Difference: Projection - Line">Diff <span class="arrow"></span></th>
  <th onclick="sortBy('avg')" title="Season Average">Avg <span class="arrow"></span></th>
  <th onclick="sortBy('l5')" title="Hit Rate Last 5 Games">L5 <span class="arrow"></span></th>
  <th onclick="sortBy('l10')" title="Hit Rate Last 10 Games">L10 <span class="arrow"></span></th>
  <th onclick="sortBy('hitRate')" title="Season Hit Rate">SZN <span class="arrow"></span></th>
  <th onclick="sortBy('streak')" title="Current Hit Streak">Strk</th>
  <th onclick="sortBy('confidence')" title="ORACLE Confidence">Conf <span class="arrow"></span></th>
  <th>Pick</th>
</tr>
</thead>
<tbody id="propsBody"></tbody>
</table>
</div>

</div>

<script>
let allProps = [];
let filteredProps = [];
let currentSport = 'nba';
let currentMarket = 'all';
let currentSort = { key: 'confidence', dir: -1 };
const headshotCache = {};

async function loadProps() {
  document.getElementById('propsBody').innerHTML = '<tr><td colspan="12" class="loading">Loading props...</td></tr>';
  try {
    const resp = await fetch(`/api/props/${currentSport}`);
    const data = await resp.json();
    allProps = (data.props || []).map(enrichProp);
    filterProps();
    updateStats();
  } catch(e) {
    document.getElementById('propsBody').innerHTML = `<tr><td colspan="12" class="empty">Error: ${e.message}</td></tr>`;
  }
}

function enrichProp(p) {
  const line = p.consensusLine || p.line || 0;
  const avg = p.seasonAvg || p.average || 0;
  const l5 = p.l5Avg || 0;
  const l10 = p.l10Avg || 0;
  const hitRate = p.hitRate || p.overHitRate || 0;
  const diff = avg ? (avg - line).toFixed(1) : 0;
  const proj = p.projection || avg;

  // Calculate L5/L10 hit rates from averages vs line
  const l5HitRate = p.l5HitRate || (l5 > line ? Math.min(85, 50 + (l5 - line) * 8) : Math.max(15, 50 + (l5 - line) * 8));
  const l10HitRate = p.l10HitRate || (l10 > line ? Math.min(85, 50 + (l10 - line) * 6) : Math.max(15, 50 + (l10 - line) * 6));

  return {
    ...p,
    line,
    avg: parseFloat(avg),
    l5: parseFloat(l5),
    l10: parseFloat(l10),
    proj: parseFloat(proj),
    diff: parseFloat(diff),
    hitRate: parseFloat(hitRate),
    l5HitRate: Math.round(l5HitRate),
    l10HitRate: Math.round(l10HitRate),
    confidence: p.confidence || p.grade ? gradeToNum(p.grade) : 50,
    streak: p.streak || 0,
    books: p.bookCount || p.books || 1,
    marketLabel: p.marketLabel || p.market || '',
    lineType: p.lineType || '',
  };
}

function gradeToNum(g) {
  if (!g) return 50;
  if (g.includes('A+')) return 90;
  if (g.includes('A')) return 80;
  if (g.includes('B+')) return 70;
  if (g.includes('B')) return 60;
  return 50;
}

function filterProps() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  filteredProps = allProps.filter(p => {
    if (search && !p.player?.toLowerCase().includes(search)) return false;
    if (currentMarket !== 'all') {
      const m = (p.market || p.marketLabel || '').toLowerCase();
      if (currentMarket === 'points' && !m.includes('point')) return false;
      if (currentMarket === 'rebounds' && !m.includes('rebound')) return false;
      if (currentMarket === 'assists' && !m.includes('assist')) return false;
      if (currentMarket === 'threes' && !m.includes('3') && !m.includes('three')) return false;
      if (currentMarket === 'pra' && !m.includes('pra') && !m.includes('pts+')) return false;
    }
    return true;
  });

  // Sort
  filteredProps.sort((a, b) => {
    const k = currentSort.key;
    let va = a[k], vb = b[k];
    if (k === 'player') { va = a.player || ''; vb = b.player || ''; return currentSort.dir * va.localeCompare(vb); }
    return currentSort.dir * ((parseFloat(vb) || 0) - (parseFloat(va) || 0));
  });

  renderTable();
  document.getElementById('propCount').textContent = filteredProps.length;
}

function renderTable() {
  const tbody = document.getElementById('propsBody');
  if (!filteredProps.length) {
    tbody.innerHTML = '<tr><td colspan="12" class="empty">No props found</td></tr>';
    return;
  }

  tbody.innerHTML = filteredProps.slice(0, 100).map(p => {
    const hrClass = (v) => v >= 70 ? 'hr-hot' : v >= 55 ? 'hr-warm' : v >= 40 ? 'hr-cool' : 'hr-cold';
    const diffClass = p.diff > 0 ? 'diff-pos' : p.diff < 0 ? 'diff-neg' : '';
    const streakStr = p.streak > 0 ? `<span class="streak-w">${p.streak}✓</span>` : p.streak < 0 ? `<span class="streak-l">${Math.abs(p.streak)}✗</span>` : '—';
    const tag = p.lineType === 'demon' ? '<span class="tag tag-demon">DEMON</span>' : p.lineType === 'goblin' ? '<span class="tag tag-goblin">GOBLIN</span>' : p.lineType === 'edge' ? '<span class="tag tag-edge">EDGE</span>' : '';
    const confColor = p.confidence >= 80 ? 'var(--green)' : p.confidence >= 65 ? 'var(--accent)' : 'var(--amber)';
    const pickDir = p.pick || (p.diff > 0.5 ? 'OVER' : p.diff < -0.5 ? 'UNDER' : '—');
    const pickColor = pickDir === 'OVER' ? 'var(--green)' : pickDir === 'UNDER' ? 'var(--red)' : 'var(--text-muted)';
    const game = p.game || '';
    const shortGame = game.length > 25 ? game.replace(/ @ /g, '@').replace(/Portland Trail Blazers/g,'POR').replace(/Golden State Warriors/g,'GSW') : game;

    return `<tr>
      <td>
        <div class="player-cell">
          <div>
            <div class="player-name"><a href="/player?name=${encodeURIComponent(p.player)}">${p.player}</a>${tag}</div>
            <div class="player-sub">${shortGame} · ${p.marketLabel || p.market || ''}</div>
          </div>
        </div>
      </td>
      <td><span class="line-val">${p.line}</span></td>
      <td>${p.books}</td>
      <td style="font-weight:600;">${p.proj ? p.proj.toFixed(1) : '—'}</td>
      <td class="${diffClass}">${p.diff > 0 ? '+' : ''}${p.diff ? p.diff.toFixed(1) : '—'}</td>
      <td>${p.avg ? p.avg.toFixed(1) : '—'}</td>
      <td class="${hrClass(p.l5HitRate)}">${p.l5HitRate}%</td>
      <td class="${hrClass(p.l10HitRate)}">${p.l10HitRate}%</td>
      <td class="${hrClass(p.hitRate)}">${p.hitRate ? p.hitRate.toFixed(0) + '%' : '—'}</td>
      <td>${streakStr}</td>
      <td style="color:${confColor};font-weight:700;">${p.confidence}%</td>
      <td style="color:${pickColor};font-weight:700;">${pickDir}</td>
    </tr>`;
  }).join('');
}

function updateStats() {
  const demons = allProps.filter(p => p.lineType === 'demon').length;
  const goblins = allProps.filter(p => p.lineType === 'goblin').length;
  const edges = allProps.filter(p => p.lineType === 'edge').length;
  const avgBooks = allProps.length ? (allProps.reduce((s, p) => s + p.books, 0) / allProps.length).toFixed(1) : 0;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat">Props: <strong>${allProps.length}</strong></div>
    <div class="stat">🔥 Demons: <strong>${demons}</strong></div>
    <div class="stat">👹 Goblins: <strong>${goblins}</strong></div>
    <div class="stat">⚡ Edges: <strong>${edges}</strong></div>
    <div class="stat">Avg Books: <strong>${avgBooks}</strong></div>
  `;
}

function setSport(sport) {
  currentSport = sport;
  document.querySelectorAll('#sportFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.sport === sport));
  loadProps();
}

function setMarket(market) {
  currentMarket = market;
  document.querySelectorAll('#marketFilters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.market === market));
  filterProps();
}

function sortBy(key) {
  if (currentSort.key === key) {
    currentSort.dir *= -1;
  } else {
    currentSort = { key, dir: -1 };
  }
  // Update header arrows
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  filterProps();
}

// Load on page load
loadProps();
</script>
</body>
</html>
